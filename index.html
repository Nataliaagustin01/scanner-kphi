<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPHI 2026 - Independent Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #FAF5EC; padding: 20px; }
        #reader { width: 100%; max-width: 450px; margin: auto; border: 2px solid #C8962D; border-radius: 10px; overflow: hidden; }
        .result-card { margin-top: 20px; padding: 15px; border-radius: 8px; background: white; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { background: #9B0000; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="color: #7A0000;">SCANNER ABSENSI KPHI</h2>
    <div id="reader"></div>
    <button class="btn" onclick="startCamera()">NYALAKAN KAMERA</button>

    <div id="result-card" class="result-card">
        <div id="res-nama" style="font-size: 20px; font-weight: bold;"></div>
        <div id="res-status" style="margin-top: 5px;"></div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        // GANTI INI dengan link /exec Google Apps Script kamu!
        const GAS_URL = "https://script.google.com/macros/s/AKfycby2GDMsdhVZ5eOUG8gj9O_6yXi7rz32c8OIbKcXDR9ezlzpndJtZmn9fOVkXfnoTfhdtA/exec";

        function startCamera() {
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    sendToGas(decodedText);
                }
            ).catch(err => alert("Error Kamera: " + err));
        }

        function sendToGas(id) {
            const card = document.getElementById('result-card');
            const status = document.getElementById('res-status');
            const nama = document.getElementById('res-nama');

            card.style.display = "block";
            status.innerText = "Memproses ID: " + id + "...";
            nama.innerText = "LOADING";

            // Mengirim data ke Apps Script menggunakan mode no-cors atau via redirect
            fetch(`${GAS_URL}?action=absensi&id=${id}`)
                .then(response => response.json())
                .then(res => {
                    if(res.success) {
                        nama.innerText = res.nama;
                        status.innerText = "✅ " + res.message;
                        card.style.borderLeft = "8px solid green";
                    } else {
                        nama.innerText = "GAGAL";
                        status.innerText = "❌ " + res.message;
                        card.style.borderLeft = "8px solid red";
                    }
                })
                .catch(err => {
                    status.innerText = "Error Koneksi ke Server.";
                });
        }
    </script>
</body>
</html>
