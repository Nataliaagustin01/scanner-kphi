<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPHI 2026 - Independent Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #FAF5EC; padding: 20px; }
        #reader { width: 100%; max-width: 450px; margin: auto; border: 2px solid #C8962D; border-radius: 10px; overflow: hidden; }
        .result-card { margin-top: 20px; padding: 15px; border-radius: 8px; background: white; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { background: #9B0000; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="color: #7A0000;">SCANNER ABSENSI KPHI</h2>
    <div id="reader"></div>
    <button class="btn" onclick="startCamera()">NYALAKAN KAMERA</button>

    <div id="result-card" class="result-card">
    <div id="res-nama" style="font-size: 20px; font-weight: bold;"></div>
    <div id="res-status" style="margin-top: 5px;"></div>
    
    <button id="btn-next" class="btn" style="background: #2E7D32; display: none; margin-top: 15px; width: 100%;" onclick="resetScanner()">
        SIAP SCAN LAGI
    </button>
</div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        // GANTI INI dengan link /exec Google Apps Script kamu!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbywydPWOQVVx_Oer-4pG_5SS0KDEb1x937u4VVvHNQxRftQ01G87APX2fMx-01EtoVLSA/exec";

       let isLocked = false; 

    function startCamera() {
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                if (isLocked) return; // Jika terkunci, abaikan QR yang lewat
                
                isLocked = true; // Kunci segera setelah QR terbaca
                sendToGas(decodedText);
            }
        ).catch(err => alert("Error Kamera: " + err));
    }

    function sendToGas(id) {
        const card = document.getElementById('result-card');
        const status = document.getElementById('res-status');
        const nama = document.getElementById('res-nama');
        const btnNext = document.getElementById('btn-next');

        card.style.display = "block";
        btnNext.style.display = "none"; // Sembunyikan tombol saat proses
        status.innerText = "Mengirim data ID: " + id + "...";
        nama.innerText = "LOADING";

        fetch(`${GAS_URL}?action=absensi&id=${id}`)
            .then(response => response.json())
            .then(res => {
                if(res.success) {
                    nama.innerText = res.nama;
                    status.innerText = "✅ " + "Berhasil";
                    card.style.borderLeft = "8px solid green";
                } else {
                    nama.innerText = "GAGAL";
                    status.innerText = "❌ " + "Gagal";
                    card.style.borderLeft = "8px solid red";
                }
                
                // Tampilkan tombol "Scan Lagi" setelah respon server diterima
                btnNext.style.display = "block";
            })
            .catch(err => {
                status.innerText = "Error Koneksi.";
                btnNext.style.display = "block";
            });
    }

    // Fungsi untuk membuka kunci dan membersihkan layar
    function resetScanner() {
        isLocked = false;
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('res-nama').innerText = "";
        document.getElementById('res-status').innerText = "Silakan scan kartu berikutnya...";
        document.getElementById('result-card').style.borderLeft = "none";
    }
</script>
</body>
</html>
